name: Recovery Builder (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip
          
      - name: Build
        run: |
          echo "Starting manual build process..."
          # Здесь мы просто проверяем, работают ли команды
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          echo "Environment ready!"
