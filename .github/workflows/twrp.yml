name: Recovery Builder (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc unzip git

      - name: Sync and Build
        run: |
          echo "Syncing TWRP manifest..."
          git config --global user.email "bot@example.com"
          git config --global user.name "Builder Bot"
          # Здесь мы скачиваем основу для сборки
          mkdir ~/twrp && cd ~/twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-12.1 --depth=1
          echo "Everything is ready for the next step!"
