name: TWRP Builder Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare System
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl bc build-essential zip unzip libstdc++6 python3

      - name: Sync Test
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          
          git config --global user.email "bot@example.com"
          git config --global user.name "Builder"
          
          echo "Connecting to TWRP source..."
          # Убрал параметр -b (ветку), теперь он сам найдет нужную
          python3 ~/bin/repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git --depth=1
          echo "Final check..."
          python3 ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
