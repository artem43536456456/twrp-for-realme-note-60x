name: Manual Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Sync TWRP Sources
        run: |
          export PATH=$HOME/bin:$PATH
          mkdir ~/twrp && cd ~/twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync

      - name: Setup Device Tree
        run: |
          # Создаем правильную структуру папок для Realme
          mkdir -p ~/twrp/device/realme/RMX3938
          # Копируем твои файлы из репозитория в эту папку
          cp -r $GITHUB_WORKSPACE/* ~/twrp/device/realme/RMX3938/

      - name: Build
        run: |
          export PATH=$HOME/bin:$PATH
          cd ~/twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          mka recoveryimage -j$(nproc --all)

      - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Realme-Note-60x
        path: |
          out/target/product/*/recovery.img
          out/target/product/*/*.zip
