name: Recovery Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libx11-dev libgl1-mesa-dev g++-multilib libxml2-utils xsltproc unzip
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: Sync and Build
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all)
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          # Собираем и сразу КОПИРУЕМ файл в безопасное место, пока его не удалили
          make recoveryimage -j$(nproc --all)
          mkdir -p ../safe_out
          find out/target/product/RMX3938/ -name "*.img" -exec cp {} ../safe_out/ \;

      - name: Patch Image
        run: |
          # Теперь работаем в папке safe_out
          wget https://github.com/artem43536456456/twrp-for-realme-note-60x/raw/main/magiskboot
          chmod a+x magiskboot
          
          IMG_FILE=$(find safe_out/ -name "recovery.img" -o -name "boot.img" | head -n 1)
          if [ -z "$IMG_FILE" ]; then
            echo "FAILED: Image not found even in safe_out!"
            ls -R safe_out/
            exit 1
          fi
          
          cp "$IMG_FILE" recovery.img
          ./magiskboot unpack recovery.img
          mv ramdisk.cpio ramdisk_new.cpio
          # Достаем оригинал из дерева устройств
          cp twrp/device/realme/RMX3938/stock_init_boot.img .
          ./magiskboot unpack stock_init_boot.img
          mv ramdisk_new.cpio ramdisk.cpio
          ./magiskboot repack stock_init_boot.img patched_init_boot.img

      - name: Upload Final
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Final-Result
          path: patched_init_boot.img
