- name: Patch Image
        run: |
          cd twrp
          wget https://github.com/artem43536456456/twrp-for-realme-note-60x/raw/main/magiskboot
          chmod a+x magiskboot
          
          echo "=== CHECKING BUILD LOGS ==="
          # Если файла нет, покажем последние строки сборки
          ls -R out/target/product/RMX3938/ || echo "Out directory is missing!"
          
          echo "=== SEARCHING FOR ANY BIG IMAGES ==="
          find . -name "*.img" -size +10M
          
          # Пробуем найти файл еще раз, максимально широко
          OUT_IMAGE=$(find $(pwd)/out -name "*.img" | grep -v "obj" | head -n 1)
          
          if [ -z "$OUT_IMAGE" ]; then
            echo "ERROR: STILL NO IMAGE! Showing last 50 lines of build process:"
            tail -n 50 /home/runner/work/_temp/*.log || echo "No logs found."
            exit 1
          fi
          
          echo "Found: $OUT_IMAGE"
          cp "$OUT_IMAGE" recovery.img
          ./magiskboot unpack recovery.img
          mv ramdisk.cpio ramdisk_new.cpio
          cp device/realme/RMX3938/stock_init_boot.img .
          ./magiskboot unpack stock_init_boot.img
          mv ramdisk_new.cpio ramdisk.cpio
          ./magiskboot repack stock_init_boot.img patched_init_boot.img

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Final
          path: twrp/patched_init_boot.img
