name: Recovery Build FINAL 50
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          
          # ХАК ДЛЯ НИНДЗИ: делаем вид, что файлы созданы только что
          find device/realme/RMX3938/ -type f -exec touch {} +
          
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          
          # Принудительная глубокая очистка перед стартом
          make clean
          
          # Собираем recovery и принудительно boot, если первое не пойдет
          make recoveryimage -j$(nproc --all) || make bootimage -j$(nproc --all)
          
          # Сбор артефактов
          mkdir -p ../FINAL_OUTPUT
          find out/target/product/RMX3938/ -name "*.img" -size +15M -exec cp {} ../FINAL_OUTPUT/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_Realme_Note60x
          path: FINAL_OUTPUT/
          if-no-files-found: error
