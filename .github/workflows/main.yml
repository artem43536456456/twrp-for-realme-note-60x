name: Recovery Build Final Fix
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libx11-dev libgl1-mesa-dev g++-multilib libxml2-utils xsltproc unzip
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: Build
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          
          # Запускаем сборку строго внутри папки
          export ALLOW_MISSING_DEPENDENCIES=true
          bash -c "source build/envsetup.sh && lunch twrp_RMX3938-eng && make recoveryimage -j$(nproc --all)"
          
          # Создаем папку для артефактов в корне
          mkdir -p ../COLLECTION
          find out/target/product/RMX3938/ -name "*.img" -exec cp {} ../COLLECTION/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_RMX3938_IMAGE
          path: COLLECTION/
