name: Recovery Build REAL 54
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          mkdir twrp_final && cd twrp_final
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync
          
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          
          # Вместо обычного lunch делаем жесткую привязку
          lunch twrp_RMX3938-eng
          
          # УДАЛЯЕМ ПРАВИЛА НИНДЗИ, чтобы он забыл всё старое
          rm -rf out/.ninja_log out/.ninja_deps
          
          # ПРИНУДИТЕЛЬНО ПЕРЕСОБИРАЕМ ВСЁ
          # Добавляем ONE_SHOT_MAKEFILE для точечного удара
          make -j$(nproc --all) recoveryimage
          
          # ПРОВЕРКА
          if [ ! -f out/target/product/RMX3938/recovery.img ]; then
            echo "ФАЙЛА НЕТ! Ищем, что он вообще собрал:"
            find out/target/product/RMX3938/ -name "*.img"
            exit 1
          fi
          
          mkdir -p ../FINAL_OUTPUT
          cp out/target/product/RMX3938/recovery.img ../FINAL_OUTPUT/
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_Realme_Note60x
          path: FINAL_OUTPUT/
          if-no-files-found: error
