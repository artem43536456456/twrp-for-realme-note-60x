name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup and Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev x11proto-core-dev libx11-dev libgl1-mesa-dev g++-multilib abort-tooling-repo-migrator python3 python3-pip

      - name: Build Recovery
        uses: its-shreeram/twrp-recovery-build-action@main
        with:
          MANIFEST_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
          MANIFEST_BRANCH: twrp-12.1
          DEVICE_PATH: device/realme/RMX3938
          DEVICE_NAME: RMX3938
          MAKEFILE_NAME: twrp_RMX3938
          BUILD_TARGET: recovery
