name: Recovery Build FINAL 52
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          mkdir twrp_final && cd twrp_final
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync
          
          # КЛОНИРУЕМ С НОВЫМ ИМЕНЕМ ПУТИ, ЧТОБЫ ОБМАНУТЬ КЭШ
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938_NEW
          
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          
          # Пытаемся запустить через новое имя
          lunch twrp_RMX3938-eng || lunch twrp_RMX3938_NEW-eng
          
          # ПРИНУДИТЕЛЬНЫЙ СТАРТ
          make clean
          make recoveryimage -j$(nproc --all)
          
          mkdir -p ../FINAL_OUTPUT
          find out/ -name "*.img" -size +15M -exec cp {} ../FINAL_OUTPUT/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_Realme_Note60x
          path: FINAL_OUTPUT/
          if-no-files-found: error
