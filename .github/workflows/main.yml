name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup
      run: |
        docker rmi $(docker images -q)
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /opt/ghc
        sudo apt-get clean

    - name: Set up Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev x11proto-core-dev libx11-dev libgl1-mesa-dev g++-multilib mingw-w64-i686-dev libxml2-utils xsltproc gperf

    - name: Install Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Sources
      run: |
        mkdir /home/runner/twrp
        cd /home/runner/twrp
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -j$(nproc --all) --force-sync

    - name: Setup Device Tree
      run: |
        cd /home/runner/twrp
        git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938

    - name: Build
      run: |
        cd /home/runner/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_RMX3938-eng
        make recoveryimage -j$(nproc --all)

    - name: Prepare Artifacts
      run: |
        cp $(find /home/runner/twrp/out/target/product/ -name "recovery.img") $GITHUB_WORKSPACE/recovery.img
        cp $(find /home/runner/twrp/out/target/product/ -name "*.zip") $GITHUB_WORKSPACE/ || true

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Realme-Note-60x
        path: |
          recovery.img
          *.zip
