name: Recovery Build Final
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libx11-dev libgl1-mesa-dev g++-multilib libxml2-utils xsltproc unzip
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: Build
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all)
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          
          # Вместо make используем mka - это более жесткая команда сборки
          mka recoveryimage -j$(nproc --all) || mka bootimage -j$(nproc --all)
          
          # Собираем АБСОЛЮТНО ВСЁ что похоже на образ в отдельную папку
          mkdir -p ../COLLECTION
          find out/target/product/RMX3938/ -name "*.img" -exec cp {} ../COLLECTION/ \;
          find out/target/product/RMX3938/ -name "ramdisk*" -exec cp {} ../COLLECTION/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FINAL_CHANCE_FILES
          path: COLLECTION/
