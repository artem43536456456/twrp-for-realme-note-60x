name: Recovery Build FINAL 43
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          
          # Сборка
          make recoveryimage -j$(nproc --all) || make bootimage -j$(nproc --all)
          
          # Вытаскиваем файл
          mkdir -p ../FINAL_OUTPUT
          find out/ -name "*.img" -size +15M -exec cp {} ../FINAL_OUTPUT/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_Realme_Note60x
          path: FINAL_OUTPUT/
          if-no-files-found: error
