name: Recovery Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libx11-dev libgl1-mesa-dev g++-multilib libxml2-utils xsltproc unzip
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: Force Build
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all)
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          
          # Запускаем общую сборку, чтобы он не мог отвертеться
          make bootimage recoveryimage -j$(nproc --all) || echo "Build stopped, checking what we have..."
          
          echo "=== SEARCHING ALL OUT DIRECTORY ==="
          # Ищем любой файл больше 10МБ, это точно будет наш образ
          find out/target/product/RMX3938/ -type f -size +10M
          
          # Копируем всё найденное в корень для загрузки
          mkdir -p ../found_images
          find out/target/product/RMX3938/ -maxdepth 2 -name "*.img" -exec cp {} ../found_images/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ALL_IMAGES_FOUND
          path: found_images/
