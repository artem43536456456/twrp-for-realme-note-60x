name: TWRP Recovery Build - Attempt 58

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Теперь самая свежая версия!
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 python-is-python3
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync TWRP Sources
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync

      - name: Setup Device Tree
        run: |
          mkdir -p twrp/device/realme/RMX3938
          cp -r device/realme/RMX3938/* twrp/device/realme/RMX3938/
          touch twrp/device/realme/RMX3938/BoardConfig.mk

      - name: Build Boot Image
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          
          # Чистим перед билдом
          make clean
          
          # Собираем boot.img для твоего Realme
          make bootimage -j$(nproc --all)

      - name: Check and Upload
        run: |
          IMAGE=$(find twrp/out/target/product/RMX3938/ -name "boot.img")
          if [ -f "$IMAGE" ]; then
            mkdir output
            cp "$IMAGE" output/twrp_boot_RMX3938.img
          else
            echo "Файл не найден!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_Boot_Realme_Note60x
          path: output/*.img
