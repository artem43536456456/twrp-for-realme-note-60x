name: Recovery Build REAL 54
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          mkdir twrp_new && cd twrp_new
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync
          
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          
          # ГЛАВНЫЙ ХАК: меняем дату файлов, чтобы Ниндзя проснулся
          touch device/realme/RMX3938/BoardConfig.mk
          touch device/realme/RMX3938/device.mk
          
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          
          # Очистка старых логов Ниндзи
          make clean
          rm -rf out/.ninja_log out/.ninja_deps
          
          # СОБИРАЕМ ИМЕННО BOOTIMAGE
          make bootimage -j$(nproc --all)
          
          # Ищем результат
          if [ ! -f out/target/product/RMX3938/boot.img ]; then
            echo "ФАЙЛА НЕТ! Ниндзя опять всех обманул."
            find out/target/product/RMX3938/ -name "*.img"
            exit 1
          fi
          
          mkdir -p ../FINAL_OUTPUT
          cp out/target/product/RMX3938/boot.img ../FINAL_OUTPUT/twrp_boot_RMX3938.img
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP_Realme_Note60x
          path: FINAL_OUTPUT/
          if-no-files-found: error
