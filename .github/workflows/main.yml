name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build TWRP
        uses: Pofice/TWRP-Recovery-Build-Action@main
        with:
          MANIFEST_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
          MANIFEST_BRANCH: twrp-12.1
          DEVICE_PATH: device/realme/RMX3938
          DEVICE_NAME: RMX3938
          MAKEFILE_NAME: twrp_RMX3938
          BUILD_TARGET: recovery
