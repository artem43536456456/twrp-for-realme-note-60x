name: Recovery Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libx11-dev libgl1-mesa-dev g++-multilib libxml2-utils xsltproc unzip
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: Sync and Build
        run: |
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all)
          git clone https://github.com/artem43536456456/twrp-for-realme-note-60x device/realme/RMX3938
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_RMX3938-eng
          # Собираем всё подряд
          make bootimage -j$(nproc --all)
          
          # Вместо поиска конкретного файла, копируем ВООБЩЕ ВСЕ образы из out в папку выше
          mkdir -p ../output_files
          find out/target/product/RMX3938/ -maxdepth 1 -name "*.img" -exec cp {} ../output_files/ \;
          # На всякий случай заглянем глубже
          find out/target/product/RMX3938/ -name "ramdisk*" -exec cp {} ../output_files/ \;

      - name: Final Step
        run: |
          echo "=== LIST OF ALL GENERATED FILES ==="
          ls -lh output_files/
          
      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Debug-Files
          path: output_files/
