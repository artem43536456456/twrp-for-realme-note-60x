- name: Patch Init Boot
      run: |
        wget https://github.com/artem43536456456/twrp-for-realme-note-60x/raw/main/magiskboot
        chmod a+x magiskboot
        cp stock_init_boot.img init_boot.img
        ./magiskboot unpack init_boot.img
        cp /home/runner/twrp/out/target/product/RMX3938/ramdisk.img ramdisk.cpio
        ./magiskboot repack init_boot.img patched_init_boot.img

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Android15
        path: patched_init_boot.img
